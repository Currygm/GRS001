<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Organizer 控制台</title><link rel="stylesheet" href="/styles.css"></head>
<body><header><div class="brand"><div class="mark">ORG</div><div><strong>Organizer 控制台</strong><span>创建并管理多场赛事</span></div></div><div class="status"><i></i> 端口 4312</div></header>
<main><div class="section-head"><div><span class="eyebrow">RACE MANAGEMENT</span><h1>赛事创建与管理</h1></div></div>
<div class="two-col"><div class="panel"><h2>创建赛事</h2><label>赛事标题<input id="createTitle"></label><label>公开摘要<textarea id="createSummary"></textarea></label><label>开始时间（仅限今天）<input id="createStartsAt" type="datetime-local"></label><label>结束时间<input id="createEndsAt" type="datetime-local"></label><button id="createRace">创建赛事</button></div><div class="panel"><h2>已有赛事</h2><div id="raceList"></div></div></div>
<section id="detail" class="hidden"><div class="section-head"><div><span class="eyebrow">SELECTED RACE</span><h1 id="detailTitle"></h1></div></div>
<div class="two-col"><div class="panel"><h2>赛事披露</h2><label>标题<input id="titleInput"></label><label>摘要<textarea id="summaryInput"></textarea></label><p id="raceTimeStatus"></p><label>延长结束时间<input id="extendEndsAt" type="datetime-local"></label><button id="extendRace" class="secondary">延长结束时间</button><label class="toggle"><input id="posterVisible" type="checkbox"><span>公开赛事海报</span></label><button id="saveDisclosure">更新披露</button></div><div class="panel"><h2>专属赛题 PDF</h2><p id="datasetStatus"></p><label>选择 PDF<input id="datasetFile" type="file" accept="application/pdf,.pdf"></label><button id="uploadDataset">上传或替换赛题</button><pre id="datasetResult">等待操作</pre></div></div>
<div class="two-col"><div class="panel"><h2>下载权限</h2><label class="toggle"><input id="downloadPermission" type="checkbox"><span>允许 Racer 下载</span></label><button id="saveDownloadPermission">更新权限</button><div id="downloadTickets"></div></div><div class="panel"><h2>提交评审与归档</h2><p id="submissionStatus"></p><label>评分<input id="scoreInput" type="number" min="0" max="100" value="92"></label><label>评语<textarea id="commentInput"></textarea></label><button id="reviewSubmission">提交评审</button><button id="publishArchive" class="archive-btn">发布公开回顾</button></div></div>
<div class="panel"><h2>实时披露预览</h2><div id="livePreview"></div></div></section></main><div id="toast"></div><script src="/common.js"></script><script src="/organizer/app.js"></script></body></html>
