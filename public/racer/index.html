<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Racer 工作台</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="brand"><div class="mark">RCR</div><div><span>ARY Genesis Race Series</span><strong>Racer 工作台</strong><small>参赛者驾驶舱 · Ride Agents. Build the Future.</small></div></div>
    <div class="status"><i></i> 端口 4313</div>
  </header>
  <main>
    <div class="section-head"><div><span class="eyebrow">RACER IDENTITY</span><h1>参赛身份</h1></div><span id="racerBadge" class="status"><i></i> racer-001</span></div>
    <div class="panel identity-panel">
      <label><span class="field-label required">Racer ID</span><input id="racerIdInput" data-requirement="required" autocomplete="off" spellcheck="false" required></label>
      <div class="identity-actions">
        <button class="secondary" data-racer-preset="racer-001">racer-001</button>
        <button class="secondary" data-racer-preset="racer-002">racer-002</button>
        <button class="secondary" data-racer-preset="racer-003">racer-003</button>
        <button id="saveRacerId">切换身份</button>
      </div>
    </div>
    <div class="section-head"><div><span class="eyebrow">OPEN RACES</span><h1>已有赛事</h1></div></div>
    <div id="raceList" class="race-grid"></div>
    <section id="workspace" class="hidden">
      <div class="section-head"><div><span class="eyebrow">JOINED RACE</span><h1 id="raceTitle"></h1></div></div>
      <div id="raceInfo" class="panel"></div>
      <div id="racerRanking" class="panel hidden"></div>
      <div class="two-col">
        <div class="panel"><h2>结构化赛题</h2><div id="challengeDetail"></div></div>
        <div class="panel action-panel"><div class="icon">↑</div><h2>提交比赛结果</h2><label><span class="field-label required">本地 PDF</span><input id="submissionFile" data-requirement="required" type="file" accept="application/pdf,.pdf" required></label><button id="uploadSubmission">流式提交 PDF</button><pre id="uploadResult">等待操作</pre></div>
      </div>
    </section>
    <div class="section-head"><div><span class="eyebrow">PRIVATE LONG-TERM ASSETS</span><h1>我的长期证书</h1></div></div>
    <div id="certificateList" class="race-grid"></div>
  </main>
  <div id="toast"></div>
  <script src="/common.js"></script><script src="/racer/app.js"></script>
</body>
</html>
